server:
  port: 8080

spring:
  application:
    name: echotalk-backend
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/echotalk}
    username: ${SPRING_DATASOURCE_USERNAME:echotalk}
    password: ${SPRING_DATASOURCE_PASSWORD:echotalk_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

app:
  jwt:
    secret: ${JWT_SECRET:echotalk-super-secret-jwt-key-change-in-production-2024}
    expiration-ms: 86400000
  socketio:
    host: 0.0.0.0
    port: ${SOCKETIO_PORT:8081}
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174
  rate-limit:
    max-requests-per-minute: 60
